<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="heading">
        <h1>Grade Calculator</h1>
    </div>

    <div id="main">
        <h2>Categories</h2>

        <div class="table">
            <div class="category-grid category-labels">
                <span>Category</span>
                <span>Your Points</span>
                <span>Total Points</span>
                <span>Weight</span>
                <span></span>
            </div>

            <div class="category">
                <div class="category-grid">
                    <input type="text" placeholder="Category Name" value="Homework">
                    <input type="number" placeholder="Your Points">
                    <input type="number" placeholder="Total Points">
                    <input type="text" placeholder="Weight" class="weight-input">
                    <button class="deleteCategory">Delete</button>
                </div>
            </div>

            <div class="category">
                <div class="category-grid">
                    <input type="text" placeholder="Category Name" value="Assessments">
                    <input type="number" placeholder="Your Points">
                    <input type="number" placeholder="Total Points">
                    <input type="text" placeholder="Weight" class="weight-input">
                    <button class="deleteCategory">Delete</button>
                </div>
            </div>

            <div class="category">
                <div class="category-grid">
                    <input type="text" placeholder="Category Name" value="Final">
                    <input type="number" placeholder="Your Points">
                    <input type="number" placeholder="Total Points">
                    <input type="text" placeholder="Weight" class="weight-input">
                    <button class="deleteCategory">Delete</button>
                </div>
            </div>
        </div>

        <br>
        <button id="addCategory">Add Category</button>

        <div id="totalGradeDisplay" class="total-grade-display">
            Total Grade: <span id="totalPercentage">0.00%</span> <span id="totalLetter"></span>
        </div>
    </div>
</body>
</html>
